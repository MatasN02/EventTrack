<ion-header>
  <ion-toolbar>
    <ion-title>👮‍♂️ Admin – Renginių valdymas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list *ngIf="events.length > 0">
    <ion-item *ngFor="let event of events">
      <ion-label>
        <h2>{{ event.title }}</h2>
        <p>{{ event.date }} – {{ event.location }}</p>
        <p>Statusas: <b>{{ event.status }}</b></p>
      </ion-label>

      <!-- APPROVE -->
      <ion-button color="success"
                  fill="clear"
                  *ngIf="event.status !== 'Approved'"
                  (click)="approveEvent(event.id)">
        ✅
      </ion-button>

      <!-- REJECT -->
      <ion-button color="warning"
                  fill="clear"
                  *ngIf="event.status !== 'Rejected'"
                  (click)="rejectEvent(event.id)">
        ❌
      </ion-button>

      <!-- DELETE -->
      <ion-button color="danger"
                  fill="clear"
                  (click)="deleteEvent(event.id)">
        🗑
      </ion-button>
    </ion-item>
  </ion-list>

  <ion-text *ngIf="events.length === 0">
    Nėra renginių
  </ion-text>

</ion-content>
