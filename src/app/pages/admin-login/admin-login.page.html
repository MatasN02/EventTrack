<ion-header>
  <ion-toolbar>
    <ion-title>Administratoriaus prisijungimas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-label position="floating">El. paštas</ion-label>
    <ion-input type="email" [(ngModel)]="email"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Slaptažodis</ion-label>
    <ion-input type="password" [(ngModel)]="password"></ion-input>
  </ion-item>

  <ion-button expand="block" (click)="login()" style="margin-top: 20px">
    Prisijungti
  </ion-button>

</ion-content>
