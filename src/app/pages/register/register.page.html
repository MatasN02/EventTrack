<ion-header>
  <ion-toolbar>
    <ion-title>Registracija</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-input type="email"
               placeholder="El. paštas"
               [(ngModel)]="email">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-input type="password"
               placeholder="Slaptažodis"
               [(ngModel)]="password">
    </ion-input>
  </ion-item>

  <ion-button expand="block" (click)="register()">
    Registruotis
  </ion-button>

  <ion-button fill="clear" routerLink="/login">
    Grįžti į prisijungimą
  </ion-button>
</ion-content>
