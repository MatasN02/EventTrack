<ion-header>
  <ion-toolbar>
    <ion-title>Kamera</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-button expand="block" (click)="takePhoto()">
    Atidaryti kamerą
  </ion-button>

  <div *ngIf="photo">
    <h3>Nuotrauka:</h3>
    <img [src]="photo" style="width:100%; border-radius:10px;" />
  </div>

</ion-content>
